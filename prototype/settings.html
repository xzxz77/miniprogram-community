<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .no-scrollbar::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>
    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 z-10">
        <a href="profile.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">设置</h1>
    </header>
    <main class="flex-1 overflow-y-auto no-scrollbar">
        <div class="bg-white mt-3">
            <div class="flex justify-between items-center p-4 border-b border-gray-50 active:bg-gray-50">
                <span class="text-gray-800 text-sm">个人资料</span>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
            <div class="flex justify-between items-center p-4 border-b border-gray-50 active:bg-gray-50">
                <span class="text-gray-800 text-sm">账号与安全</span>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
            <div class="flex justify-between items-center p-4 active:bg-gray-50">
                <span class="text-gray-800 text-sm">消息通知设置</span>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
        </div>

        <div class="bg-white mt-3">
            <div class="flex justify-between items-center p-4 border-b border-gray-50 active:bg-gray-50">
                <span class="text-gray-800 text-sm">清除缓存</span>
                <span class="text-gray-400 text-xs">12.5MB</span>
            </div>
            <div class="flex justify-between items-center p-4 active:bg-gray-50">
                <span class="text-gray-800 text-sm">关于我们</span>
                <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
            </div>
        </div>

        <div class="mt-6 px-4">
            <button class="w-full bg-white text-red-500 font-bold py-3 rounded-xl shadow-sm active:bg-gray-50">退出登录</button>
        </div>
    </main>
</body>
</html>

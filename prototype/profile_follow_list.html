<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关注/粉丝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>

    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-50 sticky top-0 z-10">
        <a href="profile.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">我的关注</h1>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar">
        <!-- User Item 1 -->
        <div class="flex items-center justify-between p-4 border-b border-gray-50">
            <div class="flex items-center">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=100&h=100" class="w-12 h-12 rounded-full mr-3">
                <div>
                    <div class="font-bold text-gray-800 text-sm">花店老板娘</div>
                    <div class="text-xs text-gray-400">2栋 · 信用极好</div>
                </div>
            </div>
            <button class="bg-gray-100 text-gray-500 text-xs px-3 py-1.5 rounded-full font-bold">已关注</button>
        </div>

        <!-- User Item 2 -->
        <div class="flex items-center justify-between p-4 border-b border-gray-50">
            <div class="flex items-center">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=100&h=100" class="w-12 h-12 rounded-full mr-3">
                <div>
                    <div class="font-bold text-gray-800 text-sm">装修老王</div>
                    <div class="text-xs text-gray-400">5栋 · 信用良好</div>
                </div>
            </div>
            <button class="bg-gray-100 text-gray-500 text-xs px-3 py-1.5 rounded-full font-bold">已关注</button>
        </div>
    </main>
</body>
</html>

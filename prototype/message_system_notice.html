<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务通知</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <!-- Status Bar Spacer -->
    <div class="h-12 bg-white w-full shrink-0"></div>

    <!-- Header -->
    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 z-10">
        <a href="messages.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">服务通知</h1>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar p-4">
        
        <!-- Notice 1 -->
        <div class="mb-4">
            <div class="text-center text-xs text-gray-400 mb-2">今天 10:00</div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-gray-800">社区“以物易物”市集活动预告</h3>
                    <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                </div>
                <div class="w-full h-32 bg-orange-100 rounded-lg mb-3 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1531591022136-eb8b0da1e6d0?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" class="w-full h-full object-cover">
                </div>
                <p class="text-sm text-gray-600 mb-3 line-clamp-2">本周六下午 2 点，幸福花园小区中心广场将举办闲置物品交换市集，欢迎各位邻居携带闲置好物参加！</p>
                <div class="border-t border-gray-100 pt-3 flex justify-between items-center text-sm">
                    <span class="text-gray-800 font-medium">查看详情</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Notice 2 -->
        <div class="mb-4">
            <div class="text-center text-xs text-gray-400 mb-2">昨天 18:30</div>
            <div class="bg-white rounded-xl p-4 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-gray-800">安全交易提醒</h3>
                </div>
                <p class="text-sm text-gray-600 mb-3">近期发现有不法分子冒充买家发送钓鱼链接，请勿点击陌生链接，所有交易请在平台内完成。</p>
                <div class="border-t border-gray-100 pt-3 flex justify-between items-center text-sm">
                    <span class="text-gray-800 font-medium">查看详情</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
            </div>
        </div>

    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动消息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col font-sans">

    <!-- Status Bar Spacer -->
    <div class="h-12 bg-white w-full shrink-0"></div>

    <!-- Header -->
    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-50 sticky top-0 z-10">
        <a href="messages.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">互动消息</h1>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar">
        
        <!-- Interaction 1 (Like) -->
        <div class="flex p-4 border-b border-gray-50 active:bg-gray-50">
            <div class="relative mr-3 shrink-0">
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full">
                <div class="absolute -bottom-1 -right-1 bg-orange-500 text-white rounded-full w-4 h-4 flex items-center justify-center border border-white text-[10px]">
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
            <div class="flex-1 mr-3">
                <div class="flex justify-between items-baseline mb-1">
                    <span class="font-bold text-gray-800 text-sm">花店老板娘</span>
                    <span class="text-[10px] text-gray-400">10分钟前</span>
                </div>
                <p class="text-sm text-gray-600">赞了你的帖子</p>
            </div>
            <div class="w-14 h-14 bg-gray-100 rounded overflow-hidden shrink-0">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Interaction 2 (Comment) -->
        <div class="flex p-4 border-b border-gray-50 active:bg-gray-50">
            <div class="relative mr-3 shrink-0">
                <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full">
                <div class="absolute -bottom-1 -right-1 bg-blue-500 text-white rounded-full w-4 h-4 flex items-center justify-center border border-white text-[10px]">
                    <i class="fa-solid fa-comment"></i>
                </div>
            </div>
            <div class="flex-1 mr-3">
                <div class="flex justify-between items-baseline mb-1">
                    <span class="font-bold text-gray-800 text-sm">张工</span>
                    <span class="text-[10px] text-gray-400">1小时前</span>
                </div>
                <p class="text-sm text-gray-600">评论：这个成色看起来很不错，还能便宜点吗？</p>
            </div>
            <div class="w-14 h-14 bg-gray-100 rounded overflow-hidden shrink-0">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" class="w-full h-full object-cover">
            </div>
        </div>

         <!-- Interaction 3 (Like) -->
         <div class="flex p-4 border-b border-gray-50 active:bg-gray-50">
            <div class="relative mr-3 shrink-0">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full">
                <div class="absolute -bottom-1 -right-1 bg-orange-500 text-white rounded-full w-4 h-4 flex items-center justify-center border border-white text-[10px]">
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
            <div class="flex-1 mr-3">
                <div class="flex justify-between items-baseline mb-1">
                    <span class="font-bold text-gray-800 text-sm">装修老王</span>
                    <span class="text-[10px] text-gray-400">昨天</span>
                </div>
                <p class="text-sm text-gray-600">赞了你的商品</p>
            </div>
            <div class="w-14 h-14 bg-gray-100 rounded overflow-hidden shrink-0">
                <div class="w-full h-full bg-gray-200 flex items-center justify-center text-[10px] text-gray-500 text-center p-1 leading-tight">
                    宜家置物架...
                </div>
            </div>
        </div>

    </main>

</body>
</html>

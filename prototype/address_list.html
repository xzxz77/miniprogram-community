<!DOCTYPE html>

    <style> .no-scrollbar::-webkit-scrollbar { display: none; } </style>

<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>

            <div>
                <div class="flex items-center mb-1">
                    <span class="font-bold text-gray-800 text-lg mr-2">李大爷</span>
                    <span class="text-gray-500 text-sm">138****8888</span>
                    <span class="bg-orange-100 text-orange-600 text-[10px] px-1.5 py-0.5 rounded ml-2">默认</span>

    <div class="p-4 bg-white border-t border-gray-100">
        <button class="w-full bg-orange-500 text-white font-bold py-3 rounded-full">+ 新建地址</button>
    </div>

</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邻里集市</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .map-bg {
            background-color: #e5e7eb;
            background-image: 
                linear-gradient(90deg, #fff 2px, transparent 2px), 
                linear-gradient(#fff 2px, transparent 2px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans relative overflow-hidden">

    <!-- Simulated Map View -->
    <div class="absolute inset-0 z-0 map-bg">
        <!-- Map Elements -->
        <div class="absolute top-1/4 left-1/4 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
             <div class="bg-white px-2 py-1 rounded shadow-lg text-[10px] font-bold text-gray-800 mb-1 whitespace-nowrap">¥1800 Apple Watch</div>
             <div class="w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-sm"></div>
        </div>

        <div class="absolute top-1/3 right-1/4 transform translate-x-1/2 flex flex-col items-center">
             <div class="bg-white px-2 py-1 rounded shadow-lg text-[10px] font-bold text-gray-800 mb-1 whitespace-nowrap">¥50 滑板车</div>
             <div class="w-3 h-3 bg-orange-500 rounded-full border-2 border-white shadow-sm"></div>
        </div>

        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
             <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center animate-pulse">
                <div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-sm"></div>
             </div>
        </div>
    </div>

    <!-- Top Overlay -->
    <div class="relative z-10 pt-14 px-4 pb-4 bg-gradient-to-b from-white/90 to-transparent pointer-events-none">
        <div class="flex items-center justify-between pointer-events-auto">
            <a href="home.html" class="w-8 h-8 bg-white rounded-full shadow flex items-center justify-center text-gray-800">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div class="bg-white px-4 py-1.5 rounded-full shadow flex items-center space-x-2 text-sm">
                <i class="fa-solid fa-location-crosshairs text-blue-500"></i>
                <span class="font-bold text-gray-800">幸福花园小区</span>
                <span class="text-gray-400 text-xs pl-2 border-l border-gray-200">附近3km</span>
            </div>
            <div class="w-8 h-8 bg-white rounded-full shadow flex items-center justify-center text-gray-800">
                <i class="fa-solid fa-list-ul"></i>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet (Draggable Content) -->
    <div class="absolute bottom-0 left-0 w-full h-[65%] bg-white rounded-t-3xl shadow-2xl z-20 flex flex-col transition-all duration-300 transform">
        <!-- Drag Handle -->
        <div class="w-full h-8 flex items-center justify-center shrink-0">
            <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
        </div>

        <!-- Filter Tabs -->
        <div class="px-4 pb-2 flex space-x-4 border-b border-gray-50 shrink-0">
            <div class="text-gray-800 font-bold border-b-2 border-gray-800 pb-2">全部宝贝</div>
            <div class="text-gray-400 pb-2">生活服务</div>
            <div class="text-gray-400 pb-2">免费赠送</div>
        </div>

        <!-- List -->
        <main class="flex-1 overflow-y-auto no-scrollbar p-4">
            
            <!-- Item 1 -->
            <div class="flex mb-4 border-b border-gray-50 pb-4">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" class="w-24 h-24 rounded-lg object-cover bg-gray-200 mr-3 shrink-0">
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm line-clamp-1">Apple Watch Series 7</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-1">九成新，几乎没用过，电池100%</p>
                    </div>
                    <div>
                         <div class="flex items-center space-x-2 mb-1">
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 rounded">自提</span>
                            <span class="text-[10px] text-gray-400">2栋 · <span class="text-blue-500">距您 50m</span></span>
                         </div>
                        <div class="flex items-center justify-between">
                            <span class="text-red-500 font-bold text-lg"><span class="text-xs">¥</span>1800</span>
                            <button class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><i class="fa-regular fa-comment-dots"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="flex mb-4 border-b border-gray-50 pb-4">
                <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" class="w-24 h-24 rounded-lg object-cover bg-gray-200 mr-3 shrink-0">
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm line-clamp-1">专业美甲服务（上门）</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-1">持证美甲师，周末接单，价格美丽</p>
                    </div>
                    <div>
                         <div class="flex items-center space-x-2 mb-1">
                            <span class="text-[10px] bg-purple-50 text-purple-500 px-1.5 rounded">服务</span>
                            <span class="text-[10px] text-gray-400">5栋 · <span class="text-blue-500">距您 200m</span></span>
                         </div>
                        <div class="flex items-center justify-between">
                            <span class="text-red-500 font-bold text-lg"><span class="text-xs">¥</span>88<span class="text-[10px] text-gray-400 font-normal">/起</span></span>
                            <button class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><i class="fa-regular fa-comment-dots"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="flex mb-4 border-b border-gray-50 pb-4">
                <img src="https://images.unsplash.com/photo-1595341888016-a392ef81b7de?ixlib=rb-4.0.3&auto=format&fit=crop&w=200&q=80" class="w-24 h-24 rounded-lg object-cover bg-gray-200 mr-3 shrink-0">
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm line-clamp-1">儿童滑板车</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-1">孩子长大了不玩了，低价出</p>
                    </div>
                    <div>
                         <div class="flex items-center space-x-2 mb-1">
                            <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 rounded">可送</span>
                            <span class="text-[10px] text-gray-400">阳光小区 · <span class="text-gray-400">距您 1.5km</span></span>
                         </div>
                        <div class="flex items-center justify-between">
                            <span class="text-red-500 font-bold text-lg"><span class="text-xs">¥</span>50</span>
                            <button class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><i class="fa-regular fa-comment-dots"></i></button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>

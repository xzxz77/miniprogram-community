<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易动态</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <!-- Status Bar Spacer -->
    <div class="h-12 bg-white w-full shrink-0"></div>

    <!-- Header -->
    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 z-10">
        <a href="messages.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">交易动态</h1>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar p-4">
        
        <!-- Transaction 1: Waiting for Delivery -->
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <span class="text-orange-500 font-bold text-sm">等待卖家发货</span>
                <span class="text-xs text-gray-400">订单号: 293847291</span>
            </div>
            <div class="flex mb-3">
                <img src="https://images.unsplash.com/photo-1595341888016-a392ef81b7de?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" class="w-16 h-16 rounded-lg object-cover mr-3 shrink-0">
                <div class="flex-1">
                    <h3 class="font-bold text-gray-800 text-sm line-clamp-1">儿童滑板车，闲置出，孩子长大了</h3>
                    <p class="text-xs text-gray-500 mt-1">卖家承诺 24 小时内发货</p>
                    <div class="mt-2 text-sm font-bold">¥50.00</div>
                </div>
            </div>
            <div class="flex justify-end space-x-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-full text-xs text-gray-600">联系卖家</button>
                <button class="px-3 py-1.5 border border-gray-300 rounded-full text-xs text-gray-600">提醒发货</button>
            </div>
        </div>

        <!-- Transaction 2: Completed -->
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <span class="text-gray-500 font-bold text-sm">交易成功</span>
                <span class="text-xs text-gray-400">2023-10-24</span>
            </div>
            <div class="flex mb-3">
                <img src="https://images.unsplash.com/photo-1585336261022-680e295ce3fe?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" class="w-16 h-16 rounded-lg object-cover mr-3 shrink-0">
                <div class="flex-1">
                    <h3 class="font-bold text-gray-800 text-sm line-clamp-1">宜家置物架，搬家带不走</h3>
                    <p class="text-xs text-gray-500 mt-1">已自提</p>
                    <div class="mt-2 text-sm font-bold">¥30.00</div>
                </div>
            </div>
            <div class="flex justify-end space-x-2">
                <button class="px-3 py-1.5 border border-gray-300 rounded-full text-xs text-gray-600">删除订单</button>
                <button class="px-3 py-1.5 border border-orange-500 text-orange-500 rounded-full text-xs">去评价</button>
            </div>
        </div>

    </main>

</body>
</html>

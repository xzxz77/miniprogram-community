<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区小判官</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .no-scrollbar::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>
    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 z-10">
        <a href="profile.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800"><i class="fa-solid fa-chevron-left"></i></a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">社区小判官</h1>
    </header>
    <main class="flex-1 overflow-y-auto no-scrollbar p-4">
        <div class="bg-blue-50 text-blue-700 p-3 rounded-lg text-xs mb-4">
            <i class="fa-solid fa-circle-info mr-1"></i>
            通过参与纠纷调解投票，维护社区公平，每成功参与一次可获得+2信用分。
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-gray-800 text-white px-4 py-2 text-sm flex justify-between items-center">
                <span>案件 #20231008</span>
                <span class="bg-white/20 px-2 py-0.5 rounded text-xs">投票进行中</span>
            </div>
            <div class="p-4">
                <h3 class="font-bold text-gray-800 mb-3">商品描述不符争议</h3>
                <div class="flex space-x-4 mb-4">
                    <div class="flex-1 bg-gray-50 p-3 rounded-lg">
                        <div class="text-xs text-gray-500 mb-1">买家主张</div>
                        <p class="text-sm text-gray-800">收到的衣服有明显污渍，卖家未提前说明，申请退货。</p>
                        <div class="mt-2 h-16 w-16 bg-gray-200 rounded"></div>
                    </div>
                    <div class="flex-1 bg-gray-50 p-3 rounded-lg">
                        <div class="text-xs text-gray-500 mb-1">卖家主张</div>
                        <p class="text-sm text-gray-800">发货前是干净的，且已说明是二手物品，不退不换。</p>
                        <div class="mt-2 h-16 w-16 bg-gray-200 rounded"></div>
                    </div>
                </div>
                <div class="flex space-x-3">
                    <button class="flex-1 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold text-sm hover:bg-blue-50">支持买家</button>
                    <button class="flex-1 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold text-sm hover:bg-blue-50">支持卖家</button>
                </div>
                <p class="text-center text-xs text-gray-400 mt-3">已有 15 位邻居参与投票</p>
            </div>
        </div>
    </main>
</body>
</html>

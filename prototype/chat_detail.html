<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Status Bar Spacer -->
    <div class="h-12 bg-gray-100 w-full shrink-0"></div>

    <!-- Header -->
    <header class="bg-gray-100 px-4 py-3 flex items-center justify-between border-b border-gray-200 sticky top-0 z-20">
        <div class="flex items-center">
            <a href="messages.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1 class="font-bold text-lg text-gray-800 ml-1">李大爷</h1>
            <span class="ml-2 text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded border border-blue-200">信用极好</span>
        </div>
        <button class="text-gray-800"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <!-- Product Snapshot (Sticky) -->
    <div class="bg-white p-3 flex items-center justify-between shadow-sm z-10 sticky top-[60px]">
        <div class="flex items-center">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded object-cover mr-3">
            <div>
                <div class="text-red-500 font-bold text-sm">¥1800</div>
                <div class="text-xs text-gray-500">交易前聊一聊</div>
            </div>
        </div>
        <button class="bg-orange-500 text-white text-xs px-4 py-1.5 rounded-full font-bold">立即购买</button>
    </div>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4">
        <div class="text-center text-xs text-gray-400 py-2">昨天 10:23</div>

        <!-- Message: Other -->
        <div class="flex items-start">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full mr-3 border border-gray-200">
            <div class="bg-white p-3 rounded-lg rounded-tl-none shadow-sm max-w-[75%] text-sm text-gray-800 leading-relaxed">
                你好，这个手表还在吗？我看你写的是九成新，屏幕有划痕吗？
            </div>
        </div>

        <!-- Message: Self -->
        <div class="flex items-start justify-end">
            <div class="bg-green-500 text-white p-3 rounded-lg rounded-tr-none shadow-sm max-w-[75%] text-sm leading-relaxed">
                在的，屏幕一直贴膜，撕掉膜和新的一样。
            </div>
            <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full ml-3 border border-gray-200">
        </div>

        <!-- Message: Self (Image) -->
        <div class="flex items-start justify-end">
            <div class="bg-white p-1 rounded-lg rounded-tr-none shadow-sm max-w-[75%] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1551817958-c9c3395b452d?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" class="w-48 rounded">
            </div>
            <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full ml-3 border border-gray-200">
        </div>

        <div class="text-center text-xs text-gray-400 py-2">10:45</div>

        <!-- Message: Other -->
        <div class="flex items-start">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100" class="w-10 h-10 rounded-full mr-3 border border-gray-200">
            <div class="bg-white p-3 rounded-lg rounded-tl-none shadow-sm max-w-[75%] text-sm text-gray-800 leading-relaxed">
                看着不错，诚心想要。小伙子，我也是咱们小区的，能便宜点不？1600我待会自提。
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <div class="bg-white border-t border-gray-200 p-3 pb-6 sticky bottom-0 z-20">
        <div class="flex items-center space-x-3">
            <i class="fa-regular fa-keyboard text-gray-600 text-xl"></i>
            <div class="flex-1 bg-gray-100 rounded-full px-4 py-2 flex items-center">
                <input type="text" class="bg-transparent w-full text-sm focus:outline-none" placeholder="想跟他说点什么...">
                <i class="fa-regular fa-face-smile text-gray-500 ml-2"></i>
            </div>
            <i class="fa-regular fa-image text-gray-600 text-xl"></i>
            <i class="fa-solid fa-plus text-gray-600 text-xl"></i>
        </div>
        <!-- Quick Phrases -->
        <div class="flex space-x-2 mt-3 overflow-x-auto no-scrollbar">
            <button class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs whitespace-nowrap">还在吗？</button>
            <button class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs whitespace-nowrap">可以便宜点吗？</button>
            <button class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs whitespace-nowrap">什么时候方便交易？</button>
            <button class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs whitespace-nowrap">能看下实物图吗？</button>
        </div>
    </div>

</body>
</html>

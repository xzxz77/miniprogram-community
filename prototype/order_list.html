<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>

    <header class="bg-white sticky top-0 z-10">
        <div class="px-4 py-3 flex items-center">
            <a href="profile.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <h1 class="font-bold text-lg text-gray-800 ml-1">我的订单</h1>
        </div>
        <!-- Tabs -->
        <div class="flex justify-between px-4 text-sm border-b border-gray-100">
            <div class="pb-3 text-gray-500">全部</div>
            <div class="pb-3 border-b-2 border-orange-500 font-bold text-gray-800">待付款</div>
            <div class="pb-3 text-gray-500">待发货</div>
            <div class="pb-3 text-gray-500">待收货</div>
            <div class="pb-3 text-gray-500">售后</div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-4">
        <!-- Order 1: Unpaid -->
        <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <div class="flex items-center">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=50&h=50" class="w-5 h-5 rounded-full mr-2">
                    <span class="text-xs font-bold text-gray-700">李大爷</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 ml-1"></i>
                </div>
                <span class="text-orange-500 text-sm font-bold">等待付款</span>
            </div>
            <div class="flex mb-3">
                <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" class="w-20 h-20 rounded-lg object-cover mr-3 bg-gray-100">
                <div class="flex-1 flex flex-col justify-between">
                    <h3 class="font-bold text-gray-800 text-sm line-clamp-2">九成新 Apple Watch Series 7，几乎没用过，箱说全</h3>
                    <div class="flex justify-end">
                         <span class="text-xs text-gray-500 mr-1 mt-1">需付款</span>
                         <span class="text-base font-bold text-gray-800">¥1800.00</span>
                    </div>
                </div>
            </div>
            <div class="flex justify-end space-x-2 pt-1">
                <button class="px-3 py-1.5 border border-gray-300 rounded-full text-xs text-gray-600">取消订单</button>
                <button class="px-4 py-1.5 bg-orange-500 text-white rounded-full text-xs font-bold">立即付款</button>
            </div>
        </div>
    </main>
</body>
</html>

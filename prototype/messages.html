<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white h-screen flex flex-col font-sans">

    <!-- Status Bar Spacer -->
    <div class="h-12 bg-white w-full shrink-0"></div>

    <!-- Header -->
    <header class="px-4 py-3 sticky top-0 bg-white z-10 border-b border-gray-50">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-800">消息</h1>
            <span class="text-sm text-gray-500">清除未读</span>
        </div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar pb-20">
        
        <!-- System Notices -->
        <div class="flex justify-around py-4 border-b border-gray-100">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center text-orange-500 mb-1 relative">
                    <i class="fa-solid fa-bell text-xl"></i>
                    <div class="absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
                </div>
                <span class="text-xs text-gray-600">服务通知</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-500 mb-1">
                    <i class="fa-solid fa-comment-dots text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">互动消息</span>
            </div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-500 mb-1">
                    <i class="fa-solid fa-shop text-xl"></i>
                </div>
                <span class="text-xs text-gray-600">交易动态</span>
            </div>
        </div>

        <!-- Chat List -->
        <div>
            <!-- Chat Item 1 -->
            <div class="flex items-center px-4 py-4 active:bg-gray-50">
                <div class="relative mr-3">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&h=100" class="w-12 h-12 rounded-full">
                    <div class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 rounded-full border border-white">2</div>
                </div>
                <div class="flex-1 border-b border-gray-50 pb-4 h-full">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="font-bold text-gray-800">李大爷</span>
                        <span class="text-[10px] text-gray-400">10:23</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <p class="text-sm text-gray-500 truncate w-48">小伙子，那个手表还在吗？诚心想要。</p>
                        <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" class="w-8 h-8 rounded object-cover ml-2">
                    </div>
                </div>
            </div>

            <!-- Chat Item 2 -->
            <div class="flex items-center px-4 py-4 active:bg-gray-50">
                <div class="relative mr-3">
                    <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=100&h=100" class="w-12 h-12 rounded-full">
                </div>
                <div class="flex-1 border-b border-gray-50 pb-4 h-full">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="font-bold text-gray-800">张工</span>
                        <span class="text-[10px] text-gray-400">昨天</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <p class="text-sm text-gray-500 truncate w-48">好的，那我晚上下班过去拿置物架。</p>
                        <img src="https://images.unsplash.com/photo-1585336261022-680e295ce3fe?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" class="w-8 h-8 rounded object-cover ml-2">
                    </div>
                </div>
            </div>

            <!-- Chat Item 3 -->
            <div class="flex items-center px-4 py-4 active:bg-gray-50">
                <div class="relative mr-3">
                    <img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d?auto=format&fit=crop&w=100&h=100" class="w-12 h-12 rounded-full">
                </div>
                <div class="flex-1 border-b border-gray-50 pb-4 h-full">
                    <div class="flex justify-between items-baseline mb-1">
                        <span class="font-bold text-gray-800">社区小判官-系统</span>
                        <span class="text-[10px] text-gray-400">周一</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <p class="text-sm text-gray-500 truncate w-48">您参与的纠纷调解已有结果，点击查看详情。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Tab Bar -->
    <nav class="bg-white border-t border-gray-200 h-20 flex items-start justify-around pt-3 shrink-0 absolute bottom-0 w-full">
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px]">首页</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-users text-xl mb-1"></i>
            <span class="text-[10px]">社区</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white text-xl -mt-5 shadow-lg shadow-orange-200">
                <i class="fa-solid fa-plus"></i>
            </div>
            <span class="text-[10px] mt-1">发布</span>
        </div>
        <div class="flex flex-col items-center text-orange-500">
            <i class="fa-regular fa-comment-dots text-xl mb-1"></i>
            <span class="text-[10px]">消息</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-regular fa-user text-xl mb-1"></i>
            <span class="text-[10px]">我的</span>
        </div>
    </nav>

</body>
</html>

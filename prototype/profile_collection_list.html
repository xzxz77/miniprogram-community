<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏/在售</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">
    <div class="h-12 bg-white w-full shrink-0"></div>

    <header class="bg-white px-4 py-3 flex items-center border-b border-gray-100 sticky top-0 z-10">
        <a href="profile.html" class="w-8 h-8 flex items-center justify-center -ml-2 text-gray-800">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <h1 class="font-bold text-lg text-gray-800 ml-1">我的收藏</h1>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-4">
        <div class="grid grid-cols-2 gap-4">
            <!-- Item 1 -->
            <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                <div class="h-40 bg-gray-200 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
                    <span class="absolute bottom-2 left-2 bg-blue-500 text-white text-[10px] px-1.5 py-0.5 rounded">降价了</span>
                </div>
                <div class="p-3">
                    <h4 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">全实木双人床，带床垫</h4>
                    <div class="flex items-end justify-between">
                        <span class="text-red-500 font-bold text-lg"><span class="text-xs">¥</span>500</span>
                        <span class="text-[10px] text-gray-400">200m</span>
                    </div>
                </div>
            </div>

             <!-- Item 2 -->
             <div class="bg-white rounded-xl overflow-hidden shadow-sm">
                <div class="h-40 bg-gray-200 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1595428774223-ef52624120d2?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
                </div>
                <div class="p-3">
                    <h4 class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">实木书柜，复古风格</h4>
                    <div class="flex items-end justify-between">
                        <span class="text-red-500 font-bold text-lg"><span class="text-xs">¥</span>200</span>
                        <span class="text-[10px] text-gray-400">1.2km</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
